<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRICK BREAKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
    --accent: #00f5ff;
    --accent2: #ff006e;
    --accent3: #ffd60a;
    --text: #e0e0ff;
    --dim: #444466;
    --glow: 0 0 20px rgba(0,245,255,0.4);
    --glow2: 0 0 20px rgba(255,0,110,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,245,255,0.015) 40px, rgba(0,245,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,245,255,0.015) 40px, rgba(0,245,255,0.015) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  .sidebar {
    width: 140px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .title-block {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
  }

  .title-block h1 {
    font-family: 'Teko', sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 2px;
  }

  .title-block span {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px;
    position: relative;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
  }

  .stat-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Teko', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .stat-value.pink { color: var(--accent2); text-shadow: var(--glow2); }
  .stat-value.yellow { color: var(--accent3); text-shadow: 0 0 20px rgba(255,214,10,0.4); }

  .lives-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .life-dot {
    width: 10px; height: 10px;
    background: var(--accent2);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: var(--glow2);
    transition: opacity 0.3s;
  }

  .life-dot.lost { opacity: 0.15; background: var(--dim); box-shadow: none; }

  .controls-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px;
    font-size: 10px;
    color: var(--dim);
    line-height: 1.9;
  }

  .controls-box b {
    color: var(--accent);
    font-weight: normal;
  }

  /* CANVAS AREA */
  .canvas-container {
    position: relative;
    border: 1px solid var(--border);
    background: var(--panel);
    box-shadow: 0 0 60px rgba(0,245,255,0.07), inset 0 0 40px rgba(0,0,0,0.5);
  }

  canvas { display: block; }

  /* OVERLAY */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-family: 'Teko', sans-serif;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .overlay-title.cyan { color: var(--accent); text-shadow: var(--glow); }
  .overlay-title.red { color: var(--accent2); text-shadow: var(--glow2); }
  .overlay-title.gold { color: var(--accent3); text-shadow: 0 0 30px rgba(255,214,10,0.6); }

  .overlay-sub {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 4px;
    margin-bottom: 40px;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    padding: 12px 36px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: all 0.2s;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::before { opacity: 0.1; }
  .btn:hover { box-shadow: var(--glow); }
  .btn:active { transform: scale(0.97); }

  .final-score {
    font-family: 'Teko', sans-serif;
    font-size: 22px;
    color: var(--dim);
    margin-bottom: 32px;
    letter-spacing: 2px;
  }

  .final-score span { color: var(--accent3); text-shadow: 0 0 20px rgba(255,214,10,0.4); }

  /* Scanline effect */
  .canvas-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="sidebar">
    <div class="title-block">
      <h1>BRICK<br>BREAK</h1>
      <span>v2.0</span>
    </div>

    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="scoreDisplay">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Level</div>
      <div class="stat-value yellow" id="levelDisplay">1</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Lives</div>
      <div class="lives-row" id="livesDisplay">
        <div class="life-dot"></div>
        <div class="life-dot"></div>
        <div class="life-dot"></div>
      </div>
    </div>

    <div class="controls-box">
      <b>←→</b> move<br>
      <b>SPACE</b> launch<br>
      <b>P</b> pause
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="420" height="560"></canvas>
    <div id="overlay">
      <div class="overlay-title cyan" id="overlayTitle">BRICK BREAK</div>
      <div class="overlay-sub" id="overlaySub">PRESS SPACE TO START</div>
      <div class="final-score" id="finalScore" style="display:none"></div>
      <button class="btn" id="startBtn">LAUNCH</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let state = 'idle'; // idle, playing, paused, gameover, win
let score = 0, lives = 3, level = 1;
let animId;

// Paddle
const PAD_W = 80, PAD_H = 10;
let padX = W/2 - PAD_W/2;
let padVX = 0;
const PAD_SPEED = 6;

// Ball
let ball = { x: W/2, y: H - 60, vx: 3, vy: -4, r: 7, attached: true };
const BALL_SPEED = 5;

// Keys
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'idle' || state === 'gameover' || state === 'win') startGame();
    else if (state === 'playing' && ball.attached) launchBall();
    else if (state === 'playing') togglePause();
    else if (state === 'paused') togglePause();
  }
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing' || state === 'paused') togglePause();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
document.getElementById('startBtn').addEventListener('click', () => {
  if (state === 'idle' || state === 'gameover' || state === 'win') startGame();
  else if (state === 'playing' && ball.attached) launchBall();
});

// BRICKS
const COLS = 10, ROWS = 6;
const B_W = 36, B_H = 14, B_GAP = 2;
const B_LEFT = (W - (COLS * (B_W + B_GAP) - B_GAP)) / 2;
const B_TOP = 50;

const BRICK_COLORS = [
  { fill: '#ff006e', glow: 'rgba(255,0,110,0.6)', pts: 70 },
  { fill: '#ff4500', glow: 'rgba(255,69,0,0.6)', pts: 50 },
  { fill: '#ffd60a', glow: 'rgba(255,214,10,0.6)', pts: 40 },
  { fill: '#00f5ff', glow: 'rgba(0,245,255,0.6)', pts: 30 },
  { fill: '#7b5ea7', glow: 'rgba(123,94,167,0.6)', pts: 20 },
  { fill: '#2196f3', glow: 'rgba(33,150,243,0.6)', pts: 10 },
];

let bricks = [];
function makeBricks() {
  bricks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const color = BRICK_COLORS[r];
      const hp = r < 2 ? 2 : 1;
      bricks.push({
        x: B_LEFT + c * (B_W + B_GAP),
        y: B_TOP + r * (B_H + B_GAP),
        w: B_W, h: B_H,
        color, hp, maxHp: hp, alive: true,
        sparkTimer: 0
      });
    }
  }
}

// Particles
let particles = [];
function burst(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// Flash effects
let screenFlash = 0;

function startGame() {
  score = 0; lives = 3; level = 1;
  padX = W/2 - PAD_W/2;
  makeBricks();
  resetBall();
  updateUI();
  state = 'playing';
  hideOverlay();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function resetBall() {
  ball.x = padX + PAD_W/2;
  ball.y = H - 60;
  ball.attached = true;
  const angle = -Math.PI/2 + (Math.random()-0.5) * Math.PI/3;
  ball.vx = Math.cos(angle) * BALL_SPEED;
  ball.vy = Math.sin(angle) * BALL_SPEED;
}

function launchBall() {
  if (ball.attached) ball.attached = false;
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused';
    showOverlay('PAUSED', 'PRESS P OR SPACE TO RESUME', 'cyan');
  } else if (state === 'paused') {
    state = 'playing';
    hideOverlay();
    loop();
  }
}

// Collision helpers
function ballHitRect(bx, by, br, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(bx, rx + rw));
  const nearY = Math.max(ry, Math.min(by, ry + rh));
  const dx = bx - nearX, dy = by - nearY;
  return dx*dx + dy*dy < br*br;
}

function resolveHit(brickX, brickY, brickW, brickH) {
  const overlapLeft = (ball.x + ball.r) - brickX;
  const overlapRight = (brickX + brickW) - (ball.x - ball.r);
  const overlapTop = (ball.y + ball.r) - brickY;
  const overlapBottom = (brickY + brickH) - (ball.y - ball.r);
  const minH = Math.min(overlapLeft, overlapRight);
  const minV = Math.min(overlapTop, overlapBottom);
  if (minH < minV) ball.vx = -ball.vx;
  else ball.vy = -ball.vy;
}

function loop() {
  if (state !== 'playing') return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  // Paddle movement
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) padVX = -PAD_SPEED;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) padVX = PAD_SPEED;
  else padVX = 0;
  padX = Math.max(0, Math.min(W - PAD_W, padX + padVX));

  // Ball follows paddle if attached
  if (ball.attached) {
    ball.x = padX + PAD_W/2;
    ball.y = H - 60;
    return;
  }

  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Paddle collision
  if (ball.vy > 0 &&
      ball.y + ball.r >= H - 40 - PAD_H &&
      ball.y + ball.r <= H - 30 &&
      ball.x >= padX - 4 && ball.x <= padX + PAD_W + 4) {
    ball.vy = -Math.abs(ball.vy);
    const rel = (ball.x - (padX + PAD_W/2)) / (PAD_W/2);
    ball.vx = rel * BALL_SPEED * 1.2;
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    ball.vx = ball.vx / spd * BALL_SPEED;
    ball.vy = ball.vy / spd * BALL_SPEED;
    burst(ball.x, H - 40 - PAD_H, '#00f5ff', 6);
  }

  // Ball out of bottom
  if (ball.y - ball.r > H) {
    lives--;
    screenFlash = 1;
    burst(ball.x, H, '#ff006e', 20);
    updateUI();
    if (lives <= 0) {
      state = 'gameover';
      showOverlay('GAME OVER', '', 'red', true);
      return;
    }
    resetBall();
  }

  // Brick collision
  let hit = false;
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ballHitRect(ball.x, ball.y, ball.r, b.x, b.y, b.w, b.h)) {
      if (!hit) { resolveHit(b.x, b.y, b.w, b.h); hit = true; }
      b.hp--;
      b.sparkTimer = 6;
      if (b.hp <= 0) {
        b.alive = false;
        score += b.color.pts * level;
        burst(b.x + b.w/2, b.y + b.h/2, b.color.fill, 14);
      }
    }
  }

  // Check win
  if (bricks.every(b => !b.alive)) {
    level++;
    if (level > 5) {
      state = 'win';
      showOverlay('YOU WIN!', 'LEGENDARY', 'gold', true);
    } else {
      makeBricks();
      resetBall();
      updateUI();
    }
  }

  // Screen flash decay
  screenFlash = Math.max(0, screenFlash - 0.06);

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= 0.035;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Spark timer
  for (const b of bricks) if (b.sparkTimer > 0) b.sparkTimer--;

  updateUI();
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,0,110,${screenFlash * 0.15})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Draw bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    const alpha = b.hp < b.maxHp ? 0.55 : 1;

    // Glow
    ctx.save();
    ctx.globalAlpha = alpha * 0.5;
    ctx.shadowColor = b.color.glow;
    ctx.shadowBlur = b.sparkTimer > 0 ? 20 : 8;
    ctx.fillStyle = b.color.fill;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.restore();

    // Main fill
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = b.color.fill;
    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(b.x + 2, b.y + 1, b.w - 4, 3);

    // Cracked overlay
    if (b.hp < b.maxHp) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w*0.3, b.y);
      ctx.lineTo(b.x + b.w*0.5, b.y + b.h);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Paddle
  ctx.save();
  const grad = ctx.createLinearGradient(padX, H-40-PAD_H, padX, H-40);
  grad.addColorStop(0, '#00f5ff');
  grad.addColorStop(1, '#007a99');
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 16;
  ctx.fillStyle = grad;
  ctx.fillRect(padX, H - 40 - PAD_H, PAD_W, PAD_H);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(padX + 2, H - 40 - PAD_H + 1, PAD_W - 4, 2);
  ctx.restore();

  // Ball
  ctx.save();
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 20;
  const bGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
  bGrad.addColorStop(0, '#ffffff');
  bGrad.addColorStop(0.4, '#aaffff');
  bGrad.addColorStop(1, '#00f5ff');
  ctx.fillStyle = bGrad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Launch hint
  if (ball.attached && state === 'playing') {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.005) * 0.2;
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(ball.x, ball.y - 60);
    ctx.stroke();
    ctx.restore();
  }
}

// UI
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  const dots = document.querySelectorAll('.life-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('lost', i >= lives);
  });
}

function showOverlay(title, sub, theme, showScore = false) {
  const overlay = document.getElementById('overlay');
  const t = document.getElementById('overlayTitle');
  const s = document.getElementById('overlaySub');
  const fs = document.getElementById('finalScore');
  const btn = document.getElementById('startBtn');

  t.textContent = title;
  t.className = 'overlay-title ' + theme;
  s.textContent = sub;

  if (showScore) {
    fs.style.display = 'block';
    fs.innerHTML = `SCORE: <span>${score}</span>`;
    btn.textContent = 'PLAY AGAIN';
  } else {
    fs.style.display = 'none';
    btn.textContent = 'LAUNCH';
  }

  overlay.classList.remove('hidden');
}

function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

// Touch support
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  if (ball.attached) launchBall();
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (touchStartX !== null) {
    const dx = e.touches[0].clientX - touchStartX;
    padX = Math.max(0, Math.min(W - PAD_W, padX + dx * 1.5));
    touchStartX = e.touches[0].clientX;
  }
  e.preventDefault();
}, { passive: false });

// Init
updateUI();
</script>
</body>
</html>
